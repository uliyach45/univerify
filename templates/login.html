<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniVerify — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .login-wrapper { width: 100%; max-width: 440px; padding: 20px; }
        .logo-area { text-align: center; margin-bottom: 40px; }
        .logo-icon { font-size: 3.5rem; margin-bottom: 10px; }
        .logo-title { color: #00ff41; font-size: 2rem; font-weight: 800; letter-spacing: 2px; }
        .logo-sub { color: #555; font-size: 0.85rem; margin-top: 4px; }
        .card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 36px; }
        .card-title { color: #e0e0e0; font-size: 1.3rem; font-weight: 600; margin-bottom: 6px; }
        .card-sub { color: #555; font-size: 0.85rem; margin-bottom: 28px; }
        .form-label { color: #888; font-size: 0.85rem; margin-bottom: 6px; }
        .form-control { background: #1a1a1a; border: 1px solid #333; color: #e0e0e0; border-radius: 8px; padding: 12px 16px; font-size: 0.95rem; }
        .form-control:focus { background: #1a1a1a; border-color: #00ff41; color: #e0e0e0; box-shadow: 0 0 0 3px rgba(0,255,65,0.1); }
        .btn-login { background: #00ff41; color: #000; font-weight: 700; border: none; border-radius: 8px; padding: 13px; width: 100%; font-size: 1rem; margin-top: 8px; cursor: pointer; transition: all 0.2s; }
        .btn-login:hover { background: #00cc33; transform: translateY(-1px); }
        .btn-login:active { transform: translateY(0); }
        .divider { text-align: center; color: #333; margin: 20px 0; font-size: 0.85rem; }
        .register-link { text-align: center; margin-top: 20px; }
        .register-link a { color: #00ff41; text-decoration: none; font-size: 0.9rem; }
        .register-link a:hover { text-decoration: underline; }
        .alert-error { background: #1f0d0d; border: 1px solid #ff4444; color: #ff6666; border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; font-size: 0.85rem; }
        .role-badges { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
        .role-badge { background: #1a1a1a; border: 1px solid #333; color: #888; border-radius: 6px; padding: 6px 12px; font-size: 0.78rem; flex: 1; text-align: center; }
        .role-badge span { display: block; font-size: 1.1rem; margin-bottom: 2px; }
        .demo-creds { background: #0d1a0d; border: 1px solid #1a3a1a; border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; }
        .demo-creds p { color: #555; font-size: 0.78rem; margin: 0 0 4px; }
        .demo-creds code { color: #00ff41; font-size: 0.82rem; }
        .input-group-icon { position: relative; }
        .input-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #555; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="logo-area">
        <div class="logo-icon">🎓</div>
        <div class="logo-title">UniVerify</div>
        <div class="logo-sub">Blockchain Document Verification System</div>
    </div>

    <div class="card">
        <div class="card-title">Welcome back</div>
        <div class="card-sub">Sign in to your account</div>

        <div class="role-badges">
            <div class="role-badge"><span>🔐</span>Admin</div>
            <div class="role-badge"><span>🎓</span>Student</div>
            <div class="role-badge"><span>🔍</span>Verifier</div>
        </div>

        {% if error %}
        <div class="alert-error">⚠️ {{ error }}</div>
        {% endif %}

        <div class="demo-creds">
            <p>Demo Admin Credentials:</p>
            <code>admin@university.edu / Admin@123</code>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="your@email.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group-icon">
                    <input type="password" id="password" class="form-control" placeholder="Enter password" required>
                    <span class="input-icon" onclick="togglePassword()">👁️</span>
                </div>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">🔐 Sign In</button>
        </form>

        <div class="register-link">
            Don't have an account? <a href="/register">Create one</a>
        </div>
    </div>
</div>

<script>
function togglePassword() {
    const p = document.getElementById('password');
    p.type = p.type === 'password' ? 'text' : 'password';
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.textContent = '⏳ Signing in...';
    btn.disabled = true;

    const formData = new FormData();
    formData.append('email', document.getElementById('email').value);
    formData.append('password', document.getElementById('password').value);

    try {
        const res = await fetch('/login', { method: 'POST', body: formData });
        const data = await res.json();
        if (data.success) {
            btn.textContent = '✅ Success!';
            window.location.href = data.redirect;
        } else {
            btn.textContent = '🔐 Sign In';
            btn.disabled = false;
            alert(data.error || 'Login failed');
        }
    } catch(e) {
        window.location.href = '/login';
    }
});
</script>
</body>
</html>
